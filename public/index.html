<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>🌿 我们的故事</title>
<style>
  /* ==================== 全局 ==================== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --green: #284139;
    --green-dark: #1d2f2a;
    --green-glow: rgba(40,65,57,0.2);
    --olive: #B09076;
    --olive-light: #d4c4b4;
    --khaki: #F8D794;
    --khaki-light: #faf0dc;
    --accent: #BB6830;
    --accent-dark: #9e5526;
    --accent-glow: rgba(187,104,48,0.3);
    --dark: #111A19;
    --bg: #F0EDE8;
    --bg-alt: #E3DDD4;
    --card: #ffffff;
    --text: #1d2a25;
    --text-light: #7a8a82;
    --text-muted: #aab5ae;
    --shadow: 0 8px 30px rgba(17,26,25,0.08);
    --shadow-lg: 0 16px 50px rgba(17,26,25,0.14);
    --radius: 16px;
    --radius-sm: 10px;
    --font: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    --nav-h: 64px;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ==================== 背景装饰 ==================== */
  .bg-deco {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .bg-deco .orb {
    position: absolute; border-radius: 50%; filter: blur(90px);
    opacity: 0.12; animation: orbFloat 30s ease-in-out infinite;
  }
  .bg-deco .orb:nth-child(1) {
    width: 500px; height: 500px; top: -180px; right: -120px;
    background: radial-gradient(circle, var(--khaki), transparent);
    animation-delay: 0s;
  }
  .bg-deco .orb:nth-child(2) {
    width: 450px; height: 450px; bottom: -120px; left: -120px;
    background: radial-gradient(circle, var(--green), transparent);
    animation-delay: -8s;
  }
  .bg-deco .orb:nth-child(3) {
    width: 350px; height: 350px; top: 35%; left: 55%;
    background: radial-gradient(circle, var(--accent), transparent);
    animation-delay: -16s;
  }
  @keyframes orbFloat {
    0%,100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(25px,-25px) scale(1.05); }
    66% { transform: translate(-15px,15px) scale(0.95); }
  }

  /* ==================== 导航栏 ==================== */
  .navbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: var(--nav-h);
    background: rgba(247,244,239,0.88);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid rgba(176,144,118,0.12);
    padding: 0 24px;
    display: flex; align-items: center;
  }
  .navbar .brand {
    font-size: 18px; font-weight: 700; margin-right: auto; white-space: nowrap;
    display: flex; align-items: center; gap: 8px;
    color: var(--green);
  }
  .navbar .brand .logo {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--khaki);
  }
  .nav-links { display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; }
  .nav-links::-webkit-scrollbar { display: none; }
  .nav-links a {
    text-decoration: none; font-size: 13px; font-weight: 500;
    padding: 8px 18px; border-radius: 10px; white-space: nowrap;
    color: var(--text-light); transition: all 0.25s;
  }
  .nav-links a:hover { color: var(--green); background: var(--khaki-light); }
  .nav-links a.active {
    color: #fff;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    box-shadow: 0 4px 12px var(--green-glow);
  }

  /* ==================== 主容器 ==================== */
  .container { max-width: 960px; margin: 0 auto; padding: calc(var(--nav-h) + 20px) 16px 40px; position: relative; z-index: 1; }

  /* ==================== 页面切换 ==================== */
  .page { display: none; animation: pageIn 0.5s ease; }
  .page.active { display: block; }
  @keyframes pageIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

  /* ==================== 卡片 ==================== */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 24px;
    margin-bottom: 20px;
    border: 1px solid rgba(176,144,118,0.08);
    transition: transform 0.25s, box-shadow 0.25s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .card-title {
    font-size: 17px; font-weight: 700; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
    color: var(--text);
  }
  .card-title .icon { font-size: 20px; }

  /* ==================== 按钮 ==================== */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 22px; border: none; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all 0.25s; font-family: var(--font);
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #fff;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px var(--accent-glow);
  }
  .btn-outline {
    background: transparent; border: 2px solid var(--olive); color: var(--green);
  }
  .btn-outline:hover { background: var(--khaki-light); border-color: var(--green); }
  .btn-danger { background: #fef2f0; color: #c0392b; }
  .btn-danger:hover { background: #fde8e4; }
  .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 8px; }

  /* ==================== 输入框 ==================== */
  input, textarea, select {
    font-family: var(--font); font-size: 14px;
    border: 2px solid var(--olive-light); border-radius: var(--radius-sm);
    padding: 10px 14px; width: 100%;
    transition: border 0.25s, box-shadow 0.25s;
    background: #fdfcfa; color: var(--text);
  }
  input:focus, textarea:focus {
    outline: none; border-color: var(--green);
    box-shadow: 0 0 0 4px var(--green-glow); background: #fff;
  }
  textarea { resize: vertical; min-height: 80px; }
  label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 13px; color: var(--text-light); }
  select { cursor: pointer; }

  /* ==================== 💬 悄悄话 ==================== */
  .msg-bubble {
    padding: 14px 18px; border-radius: 18px; margin-bottom: 10px;
    max-width: 85%; position: relative;
    animation: pageIn 0.3s ease;
  }
  .msg-bubble.me {
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    color: #fff; margin-left: auto; border-bottom-right-radius: 4px;
  }
  .msg-bubble.you {
    background: var(--bg-alt); margin-right: auto; border-bottom-left-radius: 4px;
  }
  .msg-bubble .msg-time { font-size: 10px; opacity: 0.6; margin-top: 6px; text-align: right; }
  .msg-bubble .msg-name { font-size: 11px; font-weight: 600; margin-bottom: 4px; }
  .msg-input-area { display: flex; gap: 10px; align-items: flex-start; }
  .msg-input-area textarea { flex: 1; min-height: 44px; }
  .msg-input-area .btn { height: 44px; align-self: flex-end; }

  /* ==================== 🏠 首页 ==================== */

  /* -- Hero 区 -- */
  .hero {
    text-align: center; padding: 48px 24px 36px;
    border-radius: 24px; margin-bottom: 24px;
    position: relative; overflow: hidden;
    background: linear-gradient(160deg, #ece7e0 0%, #f5f0e8 40%, #f0ece2 100%);
    border: 1px solid rgba(176,144,118,0.1);
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 25% 50%, rgba(248,215,148,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 75% 50%, rgba(176,144,118,0.08) 0%, transparent 60%);
  }
  .hero * { position: relative; z-index: 1; }

  .hero .couple-name {
    font-size: 26px; font-weight: 800;
    color: var(--green);
  }
  .hero .tagline {
    color: var(--text-light); font-size: 14px; margin: 6px 0 20px;
    letter-spacing: 1px;
  }

  /* -- 大数字倒计时 -- */
  .hero-counter-wrap {
    display: inline-flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(176,144,118,0.15);
    border-radius: 20px; padding: 16px 32px;
    margin-bottom: 8px;
  }
  .hero-counter-wrap .label-small { font-size: 13px; color: var(--text-light); }
  .hero-counter-wrap .big-number {
    font-size: 60px; font-weight: 800; line-height: 1;
    color: var(--green);
  }
  .hero-counter-wrap .unit { font-size: 20px; font-weight: 600; color: var(--accent); }

  /* -- 首页统计卡片 -- */
  .home-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .home-card {
    background: var(--card); border-radius: var(--radius);
    padding: 22px 20px; text-align: center;
    border: 1px solid rgba(176,144,118,0.08);
    box-shadow: var(--shadow); cursor: pointer;
    transition: all 0.25s;
    position: relative; overflow: hidden;
  }
  .home-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
  .home-card .hc-icon { font-size: 32px; margin-bottom: 6px; display: block; }
  .home-card .hc-num { font-size: 30px; font-weight: 800; color: var(--accent); }
  .home-card .hc-label { font-size: 12px; color: var(--text-light); margin-top: 4px; }

  /* -- 首页特色区：最新照片 -- */
  .featured-section { margin-bottom: 24px; }
  .featured-photo {
    width: 100%; aspect-ratio: 16/9; border-radius: var(--radius);
    overflow: hidden; position: relative;
    background: var(--bg-alt); cursor: pointer;
    box-shadow: var(--shadow);
  }
  .featured-photo img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s; }
  .featured-photo:hover img { transform: scale(1.03); }
  .featured-photo .fp-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(17,26,25,0.65));
    padding: 40px 20px 16px; color: #fff;
  }
  .featured-photo .fp-overlay .fp-title { font-size: 15px; font-weight: 600; }
  .featured-photo .fp-overlay .fp-date { font-size: 12px; opacity: 0.7; }
  .featured-empty {
    width: 100%; aspect-ratio: 16/9; border-radius: var(--radius);
    border: 2px dashed var(--text-muted);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 14px; gap: 8px;
    background: var(--bg-alt);
  }
  .featured-empty .big { font-size: 40px; }

  /* -- 首页时间线 -- */
  .home-timeline { position: relative; padding-left: 28px; }
  .home-timeline::before {
    content: ''; position: absolute; left: 8px; top: 8px; bottom: 8px;
    width: 2px;
    background: linear-gradient(to bottom, var(--green), var(--olive), var(--khaki));
    border-radius: 2px;
  }
  .tl-item { position: relative; padding: 0 0 20px 20px; }
  .tl-item:last-child { padding-bottom: 0; }
  .tl-item .tl-dot {
    position: absolute; left: -24px; top: 4px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); border: 3px solid var(--card);
    box-shadow: 0 0 0 2px var(--accent);
  }
  .tl-item .tl-title { font-weight: 600; font-size: 14px; }
  .tl-item .tl-date { font-size: 12px; color: var(--text-light); margin-top: 2px; }

  /* ==================== 📷 相册 ==================== */
  .photo-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }
  .photo-card {
    aspect-ratio: 1; border-radius: var(--radius-sm); overflow: hidden;
    position: relative; background: var(--bg-alt); cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    transition: transform 0.3s;
  }
  .photo-card:hover { transform: scale(1.03); }
  .photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-card .photo-info {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(17,26,25,0.6));
    padding: 30px 12px 10px; color: #fff; font-size: 12px;
  }
  .photo-card .delete-photo {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.35); color: #fff; border: none;
    width: 30px; height: 30px; border-radius: 50%;
    cursor: pointer; font-size: 14px; opacity: 0; transition: opacity 0.2s;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .photo-card:hover .delete-photo { opacity: 1; }

  /* ==================== 🎉 纪念日 ==================== */
  .anniv-card {
    display: flex; align-items: center; gap: 16px;
    padding: 18px; background: var(--bg-alt); border-radius: var(--radius-sm);
    margin-bottom: 10px; border: 1px solid transparent;
    transition: all 0.25s;
  }
  .anniv-card:hover { border-color: var(--khaki); background: var(--khaki-light); }
  .anniv-card .emoji { font-size: 34px; width: 48px; text-align: center; }
  .anniv-card .info { flex: 1; min-width: 0; }
  .anniv-card .info .name { font-weight: 700; font-size: 15px; }
  .anniv-card .info .date { font-size: 12px; color: var(--text-light); margin-top: 2px; }
  .anniv-card .countdown { text-align: right; flex-shrink: 0; }
  .anniv-card .countdown .num { font-size: 24px; font-weight: 800; color: var(--accent); display: block; line-height: 1.2; }
  .anniv-card .countdown .label { font-size: 11px; color: var(--text-light); }
  .anniv-card .delete-anniv { opacity: 0; transition: opacity 0.2s; flex-shrink: 0; }
  .anniv-card:hover .delete-anniv { opacity: 1; }
  .anniv-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width:500px) { .anniv-form { grid-template-columns: 1fr; } }

  /* ==================== ⚙️ 设置 ==================== */
  .settings-group { margin-bottom: 18px; }

  /* ==================== 空状态 ==================== */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-light); }
  .empty-state .big-emoji { font-size: 48px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; }

  /* ==================== Modal ==================== */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(17,26,25,0.5); z-index: 200;
    align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 20px; padding: 28px; max-width: 520px;
    width: 90%; max-height: 85vh; overflow-y: auto;
    box-shadow: 0 25px 80px rgba(0,0,0,0.25); animation: pageIn 0.3s ease;
  }
  .modal h2 { margin-bottom: 16px; font-size: 20px; }
  .modal .form-group { margin-bottom: 14px; }
  .modal .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; flex-wrap: wrap; }

  /* ==================== Toast ==================== */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--dark); color: var(--khaki); padding: 14px 30px; border-radius: 14px;
    font-size: 14px; z-index: 300; opacity: 0; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none; white-space: nowrap; box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ==================== 闪烁星星 ==================== */
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .star {
    position: absolute; width: 4px; height: 4px; border-radius: 50%;
    background: var(--khaki); opacity: 0; animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 0.6; transform: scale(1); }
  }

  /* ==================== 爱心粒子 ==================== */
  .heart-rain { position: fixed; inset: 0; pointer-events: none; z-index: 9999; overflow: hidden; }
  .heart {
    position: absolute; top: -40px; font-size: 18px;
    animation: heartFall linear forwards; opacity: 0.35;
  }
  @keyframes heartFall {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.5; }
    100% { transform: translateY(105vh) rotate(720deg) scale(0.3); opacity: 0; }
  }

  /* ==================== 相册上传区域 ==================== */
  .upload-zone {
    border: 2px dashed var(--text-muted); border-radius: var(--radius);
    padding: 32px; text-align: center; cursor: pointer;
    transition: all 0.25s; background: var(--bg-alt);
  }
  .upload-zone:hover { border-color: var(--green); background: var(--khaki-light); }
  .upload-zone .uz-icon { font-size: 36px; margin-bottom: 8px; }
  .upload-zone .uz-text { font-size: 13px; color: var(--text-light); }

  /* ==================== 响应式 ==================== */
  @media (max-width:600px) {
    .container { padding: calc(var(--nav-h) + 12px) 12px 24px; }
    .navbar { padding: 0 12px; }
    .nav-links a { font-size: 12px; padding: 6px 12px; }
    .hero { padding: 32px 16px 24px; border-radius: 18px; }
    .hero .couple-name { font-size: 20px; }
    .hero-counter-wrap { padding: 12px 20px; }
    .hero-counter-wrap .big-number { font-size: 40px; }
    .card { padding: 20px 16px; }
    .home-cards { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .home-card { padding: 16px; }
    .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .upload-zone { padding: 20px; }
    .featured-photo { aspect-ratio: 4/3; }
  }
</style>
</head>
<body>

<!-- ========== 背景装饰 ========== -->
<div class="bg-deco">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>
<div class="stars" id="stars"></div>

<!-- ========== 导航栏 ========== -->
<nav class="navbar">
  <div class="brand">
    <span class="logo">🌿</span>
    我们的故事
  </div>
  <div class="nav-links">
    <a href="#" data-page="home" class="active">🏠 首页</a>
    <a href="#" data-page="messages">💬 悄悄话</a>
    <a href="#" data-page="photos">📷 相册</a>
    <a href="#" data-page="anniversaries">🎉 纪念日</a>
    <a href="#" data-page="settings">⚙️ 设置</a>
  </div>
</nav>

<!-- ========== Toast ========== -->
<div class="toast" id="toast"></div>

<!-- ========== 爱心雨 ========== -->
<div class="heart-rain" id="heartRain"></div>

<!-- ========== 主容器 ========== -->
<div class="container">

  <!-- ===== 🏠 首页 ===== -->
  <div class="page active" id="page-home">

    <div class="hero">
      <div class="couple-name" id="heroNames">宝贝 & 亲爱的</div>
      <div class="tagline" id="heroTagline">· 每一天都值得被纪念 ·</div>
      <div class="hero-counter-wrap">
        <div>
          <div class="label-small">我们在一起</div>
          <div class="big-number" id="dayCounter">0</div>
        </div>
        <div class="unit">天</div>
      </div>
    </div>

    <!-- 统计卡片 -->
    <div class="home-cards">
      <div class="home-card" onclick="switchPage('photos')">
        <span class="hc-icon">📷</span>
        <div class="hc-num" id="statPhotos">0</div>
        <div class="hc-label">照片</div>
      </div>
      <div class="home-card" onclick="switchPage('anniversaries')">
        <span class="hc-icon">🎉</span>
        <div class="hc-num" id="statAnniv">0</div>
        <div class="hc-label">纪念日</div>
      </div>
      <div class="home-card" onclick="switchPage('messages')">
        <span class="hc-icon">💬</span>
        <div class="hc-num" id="statMessages">0</div>
        <div class="hc-label">悄悄话</div>
      </div>
      <div class="home-card">
        <span class="hc-icon">📅</span>
        <div class="hc-num" id="statDays">0</div>
        <div class="hc-label">在一起天数</div>
      </div>
    </div>

    <!-- 最新照片 -->
    <div class="featured-section">
      <div class="card-title"><span class="icon">🖼️</span> 最新回忆</div>
      <div id="featuredPhoto" class="featured-empty">
        <div class="big">📸</div>
        <span>还没有照片，去相册上传第一张吧</span>
      </div>
    </div>

    <!-- 纪念日时间线 -->
    <div class="card" id="homeTimelineCard">
      <div class="card-title"><span class="icon">⏳</span> 我们的时间线</div>
      <div class="home-timeline" id="homeTimeline">
        <div class="empty-state" style="padding:16px;">
          <p>去设置里填上在一起的日子，时间线就会出现 ✨</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 💬 悄悄话 ===== -->
  <div class="page" id="page-messages">
    <div class="card">
      <div class="card-title"><span class="icon">💬</span> 写给 TA 的悄悄话</div>
      <div id="msgList" style="margin-bottom:16px;max-height:420px;overflow-y:auto;"></div>
      <div class="form-group" style="margin-bottom:8px;">
        <label>这条是谁发的</label>
        <div id="senderToggle" style="display:flex;gap:8px;">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 14px;border-radius:8px;border:2px solid var(--green);background:var(--green);color:#fff;transition:all 0.2s;">
            <input type="radio" name="sender" value="name1" checked style="display:none;">
            <span id="senderLabel1">👤 TA</span>
          </label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 14px;border-radius:8px;border:2px solid var(--olive-light);color:var(--text-light);transition:all 0.2s;">
            <input type="radio" name="sender" value="name2" style="display:none;">
            <span id="senderLabel2">👤 我</span>
          </label>
        </div>
      </div>
      <div class="msg-input-area">
        <textarea id="msgInput" placeholder="想说的话…" rows="2"></textarea>
        <button class="btn btn-primary" onclick="sendMessage()">发送 🌿</button>
      </div>
    </div>
  </div>

  <!-- ===== 📷 相册 ===== -->
  <div class="page" id="page-photos">
    <div class="card">
      <div class="card-title"><span class="icon">📷</span> 上传照片</div>
      <div class="form-group">
        <label>描述</label>
        <input type="text" id="photoDesc" placeholder="这张照片的故事 …">
      </div>
      <label>选择照片</label>
      <div class="upload-zone" onclick="document.getElementById('photoFile').click()">
        <div class="uz-icon">📤</div>
        <div class="uz-text" id="uploadText">点击上传照片</div>
      </div>
      <input type="file" id="photoFile" accept="image/*" onchange="onFileSelected(this)" style="display:none;">
      <div id="uploadStatus" style="font-size:13px;color:var(--text-light);margin-top:8px;display:none;"></div>
      <div style="margin-top:12px;">
        <button class="btn btn-primary" onclick="savePhoto()">保存照片</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><span class="icon">🖼️</span> 我们的相册</div>
      <div id="photoList"></div>
    </div>
  </div>

  <!-- ===== 🎉 纪念日 ===== -->
  <div class="page" id="page-anniversaries">
    <div class="card">
      <div class="card-title"><span class="icon">🎉</span> 添加纪念日</div>
      <div class="anniv-form">
        <div class="form-group">
          <label>名称</label>
          <input type="text" id="annivName" placeholder="如：在一起100天">
        </div>
        <div class="form-group">
          <label>日期</label>
          <input type="date" id="annivDate">
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label>图标</label>
          <input type="text" id="annivEmoji" placeholder="🎂 💍 🎉" style="max-width:120px;" value="🎉">
        </div>
      </div>
      <button class="btn btn-primary" onclick="addAnniversary()">➕ 添加</button>
    </div>
    <div class="card">
      <div class="card-title"><span class="icon">📅</span> 纪念日列表</div>
      <div id="annivList"></div>
    </div>
  </div>

  <!-- ===== ⚙️ 设置 ===== -->
  <div class="page" id="page-settings">
    <div class="card">
      <div class="card-title"><span class="icon">💑</span> 基本信息</div>
      <div class="settings-group">
        <label>你的昵称</label>
        <input type="text" id="setName1" placeholder="你的昵称">
      </div>
      <div class="settings-group">
        <label>TA 的昵称</label>
        <input type="text" id="setName2" placeholder="TA 的昵称">
      </div>
      <div class="settings-group">
        <label>在一起的日子</label>
        <input type="date" id="setStartDate">
      </div>
      <button class="btn btn-primary" onclick="saveSettings()">💾 保存</button>
    </div>

    <div class="card" style="text-align:center;">
      <div style="font-size:32px;margin-bottom:8px;">🔒</div>
      <div style="font-size:13px;color:var(--text-light);">所有数据存储在云端，打开这个网址就能看到</div>
      <button class="btn btn-danger btn-sm" onclick="clearAllData()" style="margin-top:14px;">🗑️ 清空所有数据</button>
    </div>
  </div>
</div>

<!-- ========== Modal ========== -->
<div class="modal-overlay" id="modal">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ==================== 数据（云端 + localStorage 缓存） ====================
const DB_KEY = 'love_world_data_v2';

function defaultData() {
  return {
    name1: '宝贝',
    name2: '亲爱的',
    startDate: '2024-01-01',
    photos: [],
    messages: [],
    anniversaries: [],
  };
}

let data = defaultData();
let loading = true;

// 从服务器加载数据
async function loadFromServer() {
  try {
    const res = await fetch('/api/data');
    const json = await res.json();
    if (json.success) {
      const s = json.data.settings;
      data.name1 = s.name1 || '宝贝';
      data.name2 = s.name2 || '亲爱的';
      data.startDate = s.startDate || '2024-01-01';
      data.photos = json.data.photos || [];
      data.messages = json.data.messages || [];
      data.anniversaries = json.data.anniversaries || [];
      // 缓存到 localStorage
      try { localStorage.setItem(DB_KEY, JSON.stringify(data)); } catch(e) {}
    }
  } catch(e) {
    // 离线 fallback: 从 localStorage 读缓存
    try {
      const raw = localStorage.getItem(DB_KEY);
      if (raw) {
        const d = JSON.parse(raw);
        const def = defaultData();
        for (const k in def) { if (!(k in d)) d[k] = def[k]; }
        data = d;
      }
    } catch(e2) {}
  }
  loading = false;
  initAfterLoad();
}

// 保存到服务器的通用函数
async function apiPost(url, body) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return res.json();
}

// ==================== Toast ====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ==================== 页面导航 ====================
function switchPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav-links a').forEach(x => x.classList.remove('active'));
  document.querySelector(`[data-page="${page}"]`).classList.add('active');
  if (page === 'home') renderHome();
  if (page === 'messages') renderMessages();
  if (page === 'photos') renderPhotos();
  if (page === 'anniversaries') renderAnniversaries();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.querySelectorAll('.nav-links a').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    switchPage(a.dataset.page);
  });
});

// ==================== 工具函数 ====================
function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function formatDateShort(d) {
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

function formatTime(d) {
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}

function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function getDaysSince(dateStr) {
  const start = new Date(dateStr);
  const now = new Date();
  start.setHours(0,0,0,0);
  now.setHours(0,0,0,0);
  return Math.max(0, Math.floor((now - start) / (1000*60*60*24)));
}

// ==================== 🏠 首页 ====================
function renderHome() {
  document.getElementById('heroNames').textContent = `${data.name1} & ${data.name2}`;

  const days = getDaysSince(data.startDate);
  document.getElementById('dayCounter').textContent = days;

  document.getElementById('statPhotos').textContent = data.photos.length;
  document.getElementById('statAnniv').textContent = data.anniversaries.length;
  document.getElementById('statMessages').textContent = data.messages.length;
  document.getElementById('statDays').textContent = days;

  renderFeaturedPhoto();
  renderHomeTimeline();
}

function renderFeaturedPhoto() {
  const container = document.getElementById('featuredPhoto');
  if (!data.photos.length) {
    container.className = 'featured-empty';
    container.innerHTML = '<div class="big">📸</div><span>还没有照片，去相册上传第一张吧</span>';
    return;
  }
  const p = data.photos[0];
  container.className = 'featured-photo';
  container.innerHTML = `
    <img src="/uploads/${p.filename}" alt="${escHtml(p.desc_text)}" onclick="openPhoto(${p.id})">
    <div class="fp-overlay">
      <div class="fp-title">${escHtml(p.desc_text)}</div>
      <div class="fp-date">${p.date}</div>
    </div>
  `;
}

function renderHomeTimeline() {
  const container = document.getElementById('homeTimeline');
  if (!data.startDate) {
    container.innerHTML = '<div class="empty-state" style="padding:16px;"><p>去设置里填上在一起的日子吧 ✨</p></div>';
    return;
  }

  const items = [];

  const sd = new Date(data.startDate);
  items.push({
    title: `🌿 故事的开始`,
    date: formatDate(sd) + ' · ' + formatDateShort(sd),
  });

  const days = getDaysSince(data.startDate);
  const milestones = [100, 200, 300, 500, 777, 1000];
  const start = new Date(data.startDate);
  milestones.forEach(m => {
    if (days >= m) {
      const d = new Date(start);
      d.setDate(d.getDate() + m);
      items.push({
        title: `🎉 第 ${m} 天`,
        date: formatDate(d) + ' · 值得纪念的日子',
      });
    }
  });

  data.anniversaries.forEach(a => {
    items.push({
      title: `${a.emoji} ${escHtml(a.name)}`,
      date: a.date,
    });
  });

  items.sort((a, b) => a.date.localeCompare(b.date));

  if (!items.length) {
    container.innerHTML = '<div class="empty-state" style="padding:16px;"><p>还没有纪念日 🎉</p></div>';
    return;
  }

  container.innerHTML = items.map(item => `
    <div class="tl-item">
      <div class="tl-dot"></div>
      <div class="tl-title">${item.title}</div>
      <div class="tl-date">${item.date}</div>
    </div>
  `).join('');
}

// ==================== 📷 相册 ====================
let selectedPhotoFile = null;

// 选择文件后
function onFileSelected(input) {
  const file = input.files[0];
  if (file) {
    selectedPhotoFile = file;
    document.getElementById('uploadText').textContent = '✅ 已选择: ' + file.name;
    document.getElementById('uploadStatus').style.display = 'none';
  }
}

// 保存照片
async function savePhoto() {
  if (!selectedPhotoFile) { showToast('请先选择一张照片 📷'); return; }

  const desc = document.getElementById('photoDesc').value.trim() || '我们的照片';
  const statusEl = document.getElementById('uploadStatus');

  statusEl.textContent = '⏳ 上传中…';
  statusEl.style.color = 'var(--text-light)';
  statusEl.style.display = 'block';

  const formData = new FormData();
  formData.append('photo', selectedPhotoFile);
  formData.append('desc', desc);

  try {
    const res = await fetch('/api/photos/upload', { method: 'POST', body: formData });
    const json = await res.json();
    if (json.success) {
      data.photos.unshift({
        id: json.id,
        filename: json.filename,
        desc_text: desc,
        date: json.date,
      });
      try { localStorage.setItem(DB_KEY, JSON.stringify(data)); } catch(e) {}
      document.getElementById('photoDesc').value = '';
      document.getElementById('photoFile').value = '';
      selectedPhotoFile = null;
      document.getElementById('uploadText').textContent = '点击上传照片';
      statusEl.style.display = 'none';
      renderPhotos();
      renderHome();
      showToast('照片已上传 📷');
    } else {
      statusEl.innerHTML = '❌ 错误: ' + (json.error || '未知');
      showToast('上传失败');
    }
  } catch(e) {
    statusEl.innerHTML = '❌ 网络错误';
    showToast('上传失败');
  }
}

async function deletePhoto(id) {
  if (!confirm('确定删除这张照片吗？')) return;
  try {
    await fetch('/api/photos/' + id, { method: 'DELETE' });
    await loadFromServer();
    renderPhotos();
    renderHome();
    showToast('已删除');
  } catch(e) { showToast('删除失败'); }
}

function openPhoto(id) {
  const p = data.photos.find(x => x.id === id);
  if (!p) return;
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <img src="/uploads/${p.filename}" style="width:100%;border-radius:12px;margin-bottom:12px;" alt="${escHtml(p.desc_text)}">
    <div style="font-size:15px;font-weight:600;">${escHtml(p.desc_text)}</div>
    <div style="font-size:12px;color:var(--text-light);margin-top:4px;">${p.date}</div>
    <div class="modal-actions">
      <button class="btn btn-sm" style="background:#eee;" onclick="closeModal()">关闭</button>
    </div>
  `;
  document.getElementById('modal').classList.add('open');
}

function renderPhotos() {
  const container = document.getElementById('photoList');
  if (!data.photos.length) {
    container.innerHTML = '<div class="empty-state"><div class="big-emoji">📷</div><p>还没有照片，上传第一张合照吧 🌿</p></div>';
    return;
  }
  container.innerHTML = '<div class="photo-grid">' + data.photos.map(p => `
    <div class="photo-card">
      <img src="/uploads/${p.filename}" alt="${escHtml(p.desc_text)}" onclick="openPhoto(${p.id})">
      <div class="photo-info">${escHtml(p.desc_text)} · ${p.date}</div>
      <button class="delete-photo" onclick="deletePhoto(${p.id})">✕</button>
    </div>
  `).join('') + '</div>';
}

// ==================== 💬 悄悄话 ====================
function updateSenderLabels() {
  document.getElementById('senderLabel1').textContent = '👤 ' + data.name1;
  document.getElementById('senderLabel2').textContent = '👤 ' + data.name2;
}

// 选中样式切换
document.addEventListener('click', function(e) {
  const radio = e.target.closest('label')?.querySelector('input[name="sender"]');
  if (radio) {
    document.querySelectorAll('#senderToggle label').forEach(l => {
      l.style.borderColor = 'var(--olive-light)';
      l.style.background = 'transparent';
      l.style.color = 'var(--text-light)';
    });
    const parent = radio.closest('label');
    parent.style.borderColor = 'var(--green)';
    parent.style.background = 'var(--green)';
    parent.style.color = '#fff';
  }
});

async function sendMessage() {
  const text = document.getElementById('msgInput').value.trim();
  if (!text) { showToast('写点什么吧 💬'); return; }

  const selected = document.querySelector('input[name="sender"]:checked');
  const sender = selected ? selected.value : 'name1';
  const time = formatDate(new Date()) + ' ' + formatTime(new Date());

  try {
    await apiPost('/api/messages', { sender, text, time });
    document.getElementById('msgInput').value = '';
    await loadFromServer();
    renderMessages();
    renderHome();
    showToast('悄悄话已发送 🌿');
    createHearts(5);
  } catch(e) { showToast('发送失败'); }
}

function renderMessages() {
  const container = document.getElementById('msgList');
  if (!data.messages.length) {
    container.innerHTML = '<div class="empty-state" style="padding:20px 0;"><div class="big-emoji">💬</div><p>还没有悄悄话… 说第一句吧 🌿</p></div>';
    return;
  }
  container.innerHTML = data.messages.map(m => {
    const isMe = m.sender === 'name1';
    const name = isMe ? data.name1 : data.name2;
    return `<div class="msg-bubble ${isMe ? 'me' : 'you'}">
      <div class="msg-name">${escHtml(name)}</div>
      <div>${escHtml(m.text)}</div>
      <div class="msg-time">${m.time}</div>
    </div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

// ==================== 🎉 纪念日 ====================
async function addAnniversary() {
  const name = document.getElementById('annivName').value.trim();
  const date = document.getElementById('annivDate').value;
  const emoji = document.getElementById('annivEmoji').value.trim() || '🎉';
  if (!name || !date) { showToast('请输入名称和日期 🎉'); return; }

  try {
    await apiPost('/api/anniversaries', { name, date, emoji });
    document.getElementById('annivName').value = '';
    document.getElementById('annivDate').value = '';
    await loadFromServer();
    renderAnniversaries();
    renderHome();
    showToast('纪念日已添加 🎉');
  } catch(e) { showToast('添加失败'); }
}

async function deleteAnniv(id) {
  if (!confirm('确定删除这个纪念日吗？')) return;
  try {
    await fetch('/api/anniversaries/' + id, { method: 'DELETE' });
    await loadFromServer();
    renderAnniversaries();
    renderHome();
  } catch(e) { showToast('删除失败'); }
}

function renderAnniversaries() {
  const container = document.getElementById('annivList');

  let html = '';

  if (data.startDate) {
    const days = getDaysSince(data.startDate);
    const d = new Date(data.startDate);
    const nextMilestone = Math.ceil((days + 1) / 100) * 100;
    html += `
      <div class="anniv-card">
        <div class="emoji">🌿</div>
        <div class="info">
          <div class="name">在一起 · 第 ${days} 天</div>
          <div class="date">${formatDate(d)}</div>
        </div>
        <div class="countdown">
          <span class="num">${nextMilestone}</span>
          <span class="label">天下个里程碑</span>
        </div>
      </div>
    `;
  }

  data.anniversaries.forEach(a => {
    const days = getDaysSince(a.date);
    const d = new Date(a.date);
    const next = new Date(d);
    next.setFullYear(next.getFullYear() + Math.floor(days / 365) + 1);
    const diffMs = next - new Date();
    const daysUntil = Math.ceil(diffMs / (1000*60*60*24));
    const years = Math.floor(days / 365);

    html += `
      <div class="anniv-card">
        <div class="emoji">${a.emoji}</div>
        <div class="info">
          <div class="name">${escHtml(a.name)}</div>
          <div class="date">${a.date} · 已 ${days} 天${years > 0 ? ` · ${years} 年` : ''}</div>
        </div>
        <div class="countdown">
          <span class="num">${daysUntil > 0 ? daysUntil : '🎉'}</span>
          <span class="label">${daysUntil > 0 ? '天后' : '就是今天！'}</span>
        </div>
        <button class="btn btn-danger btn-sm delete-anniv" onclick="deleteAnniv(${a.id})">✕</button>
      </div>
    `;
  });

  container.innerHTML = html || '<div class="empty-state"><div class="big-emoji">🎉</div><p>还没有纪念日，添加一个吧</p></div>';
}

// ==================== ⚙️ 设置 ====================
async function saveSettings() {
  const name1 = document.getElementById('setName1').value.trim();
  const name2 = document.getElementById('setName2').value.trim();
  const startDate = document.getElementById('setStartDate').value;

  try {
    await apiPost('/api/settings', { name1, name2, startDate });
    await loadFromServer();
    updateSenderLabels();
    renderHome();
    showToast('已保存 🌿');
  } catch(e) { showToast('保存失败'); }
}

// ==================== Modal ====================
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ==================== 爱心粒子 ====================
function createHearts(count = 3) {
  const container = document.getElementById('heartRain');
  const icons = ['🌿','🍃','✨','💫','🌟'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'heart';
    el.textContent = icons[Math.floor(Math.random() * icons.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.fontSize = (14 + Math.random() * 18) + 'px';
    el.style.animationDuration = (4 + Math.random() * 3) + 's';
    el.style.opacity = 0.2 + Math.random() * 0.3;
    container.appendChild(el);
    setTimeout(() => el.remove(), 7000);
  }
}

setInterval(() => createHearts(2), 12000);

// ==================== 星空 ====================
function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.width = s.style.height = (2 + Math.random() * 3) + 'px';
    s.style.animationDelay = (Math.random() * 5) + 's';
    s.style.animationDuration = (2 + Math.random() * 3) + 's';
    container.appendChild(s);
  }
}
createStars();

// ==================== 清空数据 ====================
async function clearAllData() {
  if (!confirm('确定要清空所有数据吗？此操作不可恢复！')) return;
  if (!confirm('再次确认：所有照片和纪念日都将被删除 😢')) return;
  try {
    await fetch('/api/clear', { method: 'POST' });
    data = defaultData();
    try { localStorage.removeItem(DB_KEY); } catch(e) {}
    switchPage('home');
    renderHome();
    showToast('数据已清空');
  } catch(e) { showToast('操作失败'); }
}

// ==================== 初始化 ====================
function initAfterLoad() {
  document.getElementById('setName1').value = data.name1;
  document.getElementById('setName2').value = data.name2;
  document.getElementById('setStartDate').value = data.startDate;
  updateSenderLabels();
  renderHome();
  renderMessages();
  createHearts(5);
}

loadFromServer();
</script>
</body>
</html>
